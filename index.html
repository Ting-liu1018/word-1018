function getSyllableClass(syl) {
  const s = syl.toLowerCase().replace(/[ˈˌ]/g, '');
  const vowelTeam = /(?:ai|ay|ee|ea|oa|oe|ue|ui|ie|ei|oo|au|aw|oi|oy|ou|ow)/;
  const specialEnding = /(?:tion|sion|ture|cious|tial|cial|gion|ssion|cian|tient|tience)$/;
  const rControlled = /[aeiou]+r$/i;

  // Special endings first
  if (specialEnding.test(s) || (/le$/.test(s) && s.length > 2)) return 'syl-special';
  if (/(?:ful|ness|less|ment|ive|ous|ing)$/.test(s) && s.length > 2) return 'syl-special';

  // R-controlled
  if (rControlled.test(s)) return 'syl-r-control';
  if (/[aeiou]r[^aeiou]*$/.test(s) && !/[aeiou][aeiou]/.test(s)) return 'syl-r-control';

  // Vowel team
  if (vowelTeam.test(s) && /[aeiou][aeiou]/.test(s)) return 'syl-vowel-team';

  // Magic e
  if (/[aeiou][a-z]e$/.test(s) && !/[aeiou][aeiou][a-z]e$/.test(s)) {
    const m = s.match(/^.*?[aeiou]+([a-z]+)e$/);
    if (m && m[1].length >= 1 && s.length > 2) return 'syl-magic-e';
  }

  // Open syllable
  if (/[aeiou]$/.test(s) && s.length > 0) return 'syl-open';

  // Closed syllable (default)
  return 'syl-closed';
}

function speakSyllable(sylText) {
  if (!sylText) return;
  // Use child voice with emphasis on just this syllable
  const voiceMode = load('childVoice', true);
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(sylText.toLowerCase());
    u.lang = 'en-US';
    u.rate = voiceMode ? 0.7 : 0.85;
    u.pitch = voiceMode ? 1.35 : 1.0;
    // Find a suitable voice
    const voices = window.speechSynthesis.getVoices();
    const childLike = voices.find(v => /google/i.test(v.name) && /english/i.test(v.lang))
      || voices.find(v => /microsoft/i.test(v.name) && /english/i.test(v.lang) && /david/i.test(v.name));
    if (childLike && voiceMode) u.voice = childLike;
    window.speechSynthesis.speak(u);
  }
}

function colorSyllables(partsStr) {
  if (!partsStr) return '';
  const syls = partsStr.split('-');
  return syls.map(s => {
    const cls = getSyllableClass(s);
    const escaped = s.replace(/'/g, "\\'");
    return `<span class="${cls} font-bold cursor-pointer hover:underline hover:opacity-80 transition" onclick="event.stopPropagation();speakSyllable('${escaped}')" title="点击听音节发音">${s}</span>`;
  }).join('<span class="text-gray-300 dark:text-gray-600 mx-0.5">-</span>');
}

function colorSyllablesInline(partsStr) {
  if (!partsStr) return '';
  const syls = partsStr.split('-');
  return syls.map(s => {
    const cls = getSyllableClass(s);
    const escaped = s.replace(/'/g, "\\'");
    return `<span class="${cls} cursor-pointer hover:underline hover:opacity-80 transition" onclick="event.stopPropagation();speakSyllable('${escaped}')" title="点击听音节发音">${s}</span>`;
  }).join('<span class="text-gray-300 dark:text-gray-600">-</span>');
}

function pluralForm(word) {
  const irr = irregularNouns[word.toLowerCase()];
  if (irr) return irr;
  if (/[sxz]$|[sc]h$|sh$/.test(word)) return word + 'es';
  if (/[^aeiou]y$/.test(word)) return word.slice(0, -1) + 'ies';
  if (/[^aeiou]o$/.test(word)) return word + 'es';
  if (/fe?$/.test(word)) return word.replace(/fe?$/, 'ves');
  return word + 's';
}
function pastForm(word) {
  const irr = irregularVerbs[word.toLowerCase()];
  if (irr) return irr.split('/')[0];
  if (/e$/.test(word)) return word + 'd';
  if (/[^aeiou][aeiou][^aeiouhwxy]$/.test(word) && word.length === 3) return word + word.slice(-1) + 'ed';
  if (/[^aeiou]y$/.test(word)) return word.slice(0, -1) + 'ied';
  return word + 'ed';
}
function ingForm(word) {
  const irr = irregularVerbs[word.toLowerCase()];
  if (irr) return irr.split('/')[2] || word + 'ing';
  if (/e$/.test(word) && !/ee$/.test(word)) return word.replace(/e$/, 'ing');
  if (/[^aeiou][aeiou][^aeiouhwxy]$/.test(word) && word.length === 3) return word + word.slice(-1) + 'ing';
  return word + 'ing';
}
function thirdForm(word) {
  const irr = irregularVerbs[word.toLowerCase()];
  if (irr) return irr.split('/')[1] || word + 's';
  if (/[sxz]$|[sc]h$|sh$|o$/.test(word)) return word + 'es';
  if (/[^aeiou]y$/.test(word)) return word.slice(0, -1) + 'ies';
  return word + 's';
}
function compForm(word) {
  if (word.length <= 5 && !/more|most/.test(word)) {
    if (/e$/.test(word)) return word + 'r / ' + word + 'st';
    if (/[^aeiou]y$/.test(word)) return word.slice(0,-1)+'ier / '+word.slice(0,-1)+'iest';
    if (/[^aeiou][aeiou][^aeiou]$/.test(word)) return word+word.slice(-1)+'er / '+word+word.slice(-1)+'est';
    return word + 'er / ' + word + 'est';
  }
  return 'more ' + word + ' / most ' + word;
}
function getWordForms(w) {
  const word = w.w;
  const pos = w.pos;
  const forms = [];
  if (/n\./.test(pos) || /noun/i.test(pos)) {
    const p = pluralForm(word);
    if (p !== word) forms.push(`复数 ${p}`);
  }
  if (/v\./.test(pos) || /verb/i.test(pos)) {
    forms.push(`过去式 ${pastForm(word)}`);
    forms.push(`现在分词 ${ingForm(word)}`);
    const t = thirdForm(word);
    if (t !== word + 's' || !forms.some(f=>f.includes(t))) forms.push(`第三人称 ${t}`);
  }
  if (/adj/.test(pos) || /adjective/i.test(pos)) {
    const c = compForm(word);
    forms.push(`比较 ${c}`);
  }
  if (/adv/.test(pos) || /adverb/i.test(pos)) {
    forms.push(`比较级 more ${word} / most ${word}`);
  }
  // General: show plural if noun-like
  if (forms.length === 0 && /n/.test(pos)) {
    const p = pluralForm(word);
    if (p !== word) forms.push(`复数 ${p}`);
  }
  if (forms.length === 0) {
    forms.push(`原形 ${word}`);
  }
  return forms.join(' · ');
}

function speak(text, rate=0.85) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    const voiceMode = load('childVoice', true);
    if (voiceMode) {
      u.rate = 0.7;
      u.pitch = 1.3;
      const voices = window.speechSynthesis.getVoices();
      const childLike = voices.find(v => /google/i.test(v.name) && /english/i.test(v.lang))
        || voices.find(v => /microsoft/i.test(v.name) && /english/i.test(v.lang) && /david/i.test(v.name));
      if (childLike) u.voice = childLike;
    } else {
      u.rate = rate;
      u.pitch = 1.0;
    }
    window.speechSynthesis.speak(u);
    return u;
  }
}
// Fisher-Yates shuffle — unbiased
function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function save(k,v) { localStorage.setItem(k, JSON.stringify(v)); }
function load(k,def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }

  quickSearch() {
    const input = document.getElementById('quickSearch')?.value?.trim() || '';
    if (!input) return;
    
    const allWords = units.flatMap(u => u.words.map(w => ({ ...w, unit: u })));
    const exactMatch = allWords.find(w => w.w.toLowerCase() === input.toLowerCase());
    
    if (exactMatch) {
      this.search.query = input;
      this.search.results = [exactMatch];
      this.search.selectedWord = 0;
      this.page = 'search';
      this.render();
    } else {
      const corrected = this.correctSpelling(input);
      if (corrected) {
        this.showToast(`📝 已修正为: ${corrected}`, 'info');
        const correctedMatch = allWords.find(w => w.w.toLowerCase() === corrected.toLowerCase());
        if (correctedMatch) {
          this.search.query = corrected;
          this.search.results = [correctedMatch];
          this.search.selectedWord = 0;
          this.page = 'search';
          this.render();
        } else {
          this.searchWordOnline(corrected);
        }
      } else {
        this.searchWordOnline(input);
      }
    }
  }

  correctSpelling(word) {
    const dictionary = new Set(units.flatMap(u => u.words.map(w => w.w.toLowerCase())));
    
    let bestMatch = null;
    let minDistance = Infinity;
    
    for (const dictWord of dictionary) {
      const dist = this.levenshteinDistance(word.toLowerCase(), dictWord);
      if (dist < minDistance && dist <= Math.min(2, word.length / 3)) {
        minDistance = dist;
        bestMatch = dictWord;
      }
    }
    
    return bestMatch;
  }

  levenshteinDistance(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    
    for (let i = 1; i <= b.length; i++) {
      for (let j = 1; j <= a.length; j++) {
        if (b[i - 1] === a[j - 1]) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1
          );
        }
      }
    }
    return matrix[b.length][a.length];
  }

  searchWordOnline(word) {
    this.search.query = word;
    this.search.results = [{
      w: word,
      p: '...',
      m: '正在查询...',
      ex: '',
      pos: '',
      rule: '',
      parts: '',
      tips: '',
      unit: { name: '在线查询', icon: '🔍', title: 'Online Search' }
    }];
    this.search.selectedWord = 0;
    this.page = 'search';
    this.render();
    
    const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`;
    fetch(url)
      .then(res => res.json())
      .then(data => {
        if (data[0]) {
          const entry = data[0];
          const phonetic = entry.phonetic || entry.phonetics?.[0]?.text || '';
          const meaning = entry.meanings?.[0]?.definitions?.[0]?.definition || '';
          const example = entry.meanings?.[0]?.definitions?.[0]?.example || '';
          const pos = entry.meanings?.[0]?.partOfSpeech || '';
          
          this.search.results = [{
            w: entry.word,
            p: phonetic,
            m: meaning,
            ex: example,
            pos: pos,
            rule: '在线查询单词',
            parts: this.splitSyllables(entry.word),
            tips: '在线词典查询结果',
            unit: { name: '在线查询', icon: '🌐', title: 'Online Dictionary' }
          }];
          this.render();
        }
      })
      .catch(() => {
        this.search.results = [{
          w: word,
          p: '',
          m: '无法查询该单词',
          ex: '',
          pos: '',
          rule: '',
          parts: word,
          tips: '请检查拼写或尝试其他单词',
          unit: { name: '在线查询', icon: '❌', title: 'Not Found' }
        }];
        this.render();
      });
  }

  splitSyllables(word) {
    const vowels = 'aeiouyAEIOUY';
    let syllables = [];
    let current = '';
    for (let i = 0; i < word.length; i++) {
      current += word[i];
      if (vowels.includes(word[i]) && i < word.length - 1 && !vowels.includes(word[i + 1])) {
        syllables.push(current);
        current = '';
      }
    }
    if (current) syllables.push(current);
    return syllables.length > 0 ? syllables.join('-') : word;
  }

  // --- Voice Explanation & Read-Aloud Scoring ---
  speakExplain(wordText) {
    const w = this.getWords().find(x => x.w === wordText);
    if (!w) return speak(wordText);
    // Chain utterances: word → phonetic → Chinese → example → rule → tip
    const texts = [
      {t: w.w, d: 0.8}, {t: w.p, d: 0.7},
      {t: w.m, d: 0.6, lang: 'zh-CN'},
      {t: w.ex, d: 0.8},
      {t: '拼读提示：' + w.rule, d: 0.7},
      {t: '词形变化：' + getWordForms(w), d: 0.7}
    ];
    window.speechSynthesis.cancel();
    const speakNext = (i) => {
      if (i >= texts.length) return;
      const item = texts[i];
      const u = new SpeechSynthesisUtterance(item.t);
      u.lang = item.lang || 'en-US';
      u.rate = 0.7; u.pitch = 1.2;
      u.onend = () => setTimeout(() => speakNext(i+1), 300);
      window.speechSynthesis.speak(u);
    };
    speakNext(0);
  }

  startReadAloud(wordText) {
    const w = this.getWords().find(x => x.w === wordText);
    if (!w) return;
    // Reset recording state

    this.render();
    // First speak the word as example
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(w.w);

  doListen(target) {
    // Check for SpeechRecognition support
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      this.recording = { status:'unsupported', target, score:0, recognized:'' };
      this.render();
      return;
    }
    this.recording = { status:'listening', target, score:0, recognized:'' };
    this.render();
    const recognizer = new SR();
    recognizer.lang = 'en-US';
    recognizer.interimResults = false;
    recognizer.maxAlternatives = 3;
    recognizer.onresult = (e) => {
      const alt = e.results[0];
      const best = alt[0].transcript.trim().toLowerCase();
      // Check alternatives for best match
      let bestMatch = '';
      let bestScore = 0;
      for (let i = 0; i < alt.length; i++) {
        const text = alt[i].transcript.trim().toLowerCase();
        const score = this.fuzzyMatch(text, target.toLowerCase());
        if (score > bestScore) { bestScore = score; bestMatch = text; }
      }
      this.recording = { status:'scored', target, score: bestScore, recognized: bestMatch };
      this.render();
      // Auto-clear after 3s
      if (this._clearTimer) clearTimeout(this._clearTimer);
      this._clearTimer = setTimeout(() => { this.recording = undefined; this.render(); }, 4000);
    };
    recognizer.onerror = () => {
      this.recording = { status:'scored', target, score:0, recognized:'识别失败' };
      this.render();
    };
    recognizer.start();
    // Auto-stop after 4 seconds
    setTimeout(() => { try { recognizer.stop(); } catch(e) {} }, 4000);
  }

  // Simple fuzzy matching: compare word similarity
  fuzzyMatch(input, target) {
    if (!input) return 0;
    // Exact match
    if (input === target) return 100;
    // Remove punctuation
    const clean = input.replace(/[.,!?'"]/g, '').trim();
    if (clean === target) return 95;
    // Check if target is contained in input or vice versa
    if (clean.includes(target)) return 85;
    if (target.includes(clean)) return 80;
    // Word-by-word: check how many words match
    const inWords = clean.split(/\s+/);
    const tWords = target.split(/\s+/);
    let matches = 0;
    for (const tw of tWords) {
      if (inWords.some(iw => iw === tw || iw.startsWith(tw) || tw.startsWith(iw))) matches++;
    }
    if (tWords.length > 0) return Math.round((matches / tWords.length) * 70);
    // Character-level: simple overlap
    let chars = 0;
    for (let i = 0; i < Math.min(clean.length, target.length); i++) {
      if (clean[i] === target[i]) chars++;
    }
    const maxLen = Math.max(clean.length, target.length);
    return Math.round((chars / maxLen) * 50);
  }

  startGame(level = null) {
    this.page='game';
    const allTypes = ['choose','listen','match','spell','order'];
    const ws = this.getWords();
    const questions = [];
    const totalQs = this.unitId ? 10 : 15;
    
    for(let i=0; i<totalQs; i++) {
      const t = allTypes[i % allTypes.length];
      const w = ws[Math.floor(Math.random()*ws.length)];
      questions.push({ type:t, word:w });
    }
    
    const lockedLevels = load('lockedLevels', []);
    const currentLevel = level || (this.unitId ? units.findIndex(u=>u.id===this.unitId)+1 : 0);
    
    this.game = {
      mode:'game', level:currentLevel, hearts:5, xp:0, combo:0, maxCombo:0,
      total:totalQs, correct:0, qIdx:0, questions,
      curr:questions[0], selected:null, result:null, finished:false, wrongWords:[],
      lockedLevels
    };
    this.prepareQuestion();
    this.render();
  }

  prepareQuestion() {
    const q = this.game.questions[this.game.qIdx];
    const ws = this.getWords();
    if (q.type === 'choose' || q.type === 'listen') {
      const others = ws.filter(w=>w.w!==q.word.w);
      const shuffled = shuffle(others);
      q.options = shuffle([q.word, ...shuffled.slice(0,3)]);
    } else if (q.type === 'match') {
      const pool = shuffle(ws).slice(0,4);
      q.matchPairs = pool.map(w=>({w:w.w, m:w.m}));
      q.matchLeft = shuffle(q.matchPairs);
      q.matchRight = shuffle(q.matchPairs);
      q.matched = [];
      q.selLeft = null;
      q.selRight = null;
      q.matchWrong = false;
    } else if (q.type === 'order') {
      const letters = q.word.w.split('');
      let shuffled;
      do {
        shuffled = shuffle([...letters]);
      } while (shuffled.join('') === q.word.w);
      q.shuffledLetters = shuffled;
      q.selectedLetters = [];
      q.remainingLetters = [...shuffled];
    }
  }

            <div class="bg-orange-50 dark:bg-orange-900/20 p-4 rounded-2xl">
              <div class="text-3xl font-bold text-orange-500">🔥${g.maxCombo}</div>
              <div class="text-xs text-gray-500 dark:text-gray-400">最高连击</div>
            </div>
          </div>
          <div class="bg-purple-50 dark:bg-purple-900/20 p-3 rounded-xl mb-6">
            <p class="text-sm text-purple-600 dark:text-purple-400">🔥 连续学习 ${streak} 天 · 累计 ${xp} XP</p>
          </div>
          ${g.wrongWords.length > 0 ? `
          <div class="bg-red-50 dark:bg-red-900/20 p-3 rounded-xl mb-6 text-left">
            <p class="text-xs font-bold text-red-500 mb-1">❌ 需要复习的单词：</p>
            <div class="flex flex-wrap gap-1">
              ${[...new Set(g.wrongWords)].map(w => `<span class="bg-red-100 dark:bg-red-900/30 px-2 py-0.5 rounded text-sm text-red-600 dark:text-red-400">${w}</span>`).join('')}
            </div>
          </div>` : ''}
          <button onclick="app.startGame()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold btn-press w-full mb-2">🔄 再玩一次</button>
          <button onclick="app.goHome()" class="bg-gray-200 dark:bg-gray-700 dark:text-gray-300 px-8 py-3 rounded-xl font-bold btn-press w-full">🏠 返回首页</button>
        </div>
      </main>`;
    }

    const q = g.curr;
    return `${toastHtml}
    <header class="bg-white dark:bg-gray-800 px-4 py-3 shadow sticky top-0 z-10">
      <div class="max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-2">
          <button onclick="app.goHome()" class="text-gray-400 dark:text-gray-500 btn-press">✕</button>
          <div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full h-3">
            <div class="h-3 rounded-full bg-green-500 progress-bar" style="width:${g.qIdx/g.total*100}%"></div>
          </div>
          <span class="text-red-500 font-bold">❤️ ${g.hearts}</span>
        </div>
        <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500">
          <span>第 ${g.qIdx+1} / ${g.total} 题</span>
          <span class="${g.combo>=3?'text-orange-500 font-bold':''}">${g.combo>=2?'🔥 连击 '+g.combo+' <span class="sparkle">✨</span>':''}</span>
          <span>⭐ ${g.xp} XP</span>
        </div>
      </div>
    </header>
    <main class="max-w-lg mx-auto px-4 py-6">
      ${g.result ? this.gameResultHTML(q) : this.gameQuestionHTML(q)}
    </main>`;
  }

  gameQuestionHTML(q) {
    const g = this.game;
    if (q.type === 'choose') {
      return `
        <div class="slide-up">
          <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-1">选出正确的单词</h2>
          <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">意思是：<span class="font-bold text-blue-600 dark:text-blue-400">${q.word.m}</span></p>
          <div class="grid grid-cols-2 gap-3 mb-4">
            ${q.options.map(o=>`<button onclick="app.answer('${o.w.replace(/'/g,"\\'")}')" class="bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 rounded-xl py-4 font-bold text-lg btn-press hover:border-green-400 dark:text-gray-200">${o.w}</button>`).join('')}
          </div>
          <button onclick="speak('${q.word.w.replace(/'/g,"\\'")}')" class="text-blue-500 text-sm">🔊 听发音提示</button>
        </div>`;
    }
    if (q.type === 'listen') {
      return `
        <div class="slide-up text-center">
          <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-4">听发音，选出单词</h2>
          <button onclick="speak('${q.word.w.replace(/'/g,"\\'")}')" class="bg-blue-500 text-white w-24 h-24 rounded-full text-4xl btn-press shadow-lg mb-6">🔊</button>
          <div class="grid grid-cols-2 gap-3">
            ${q.options.map(o=>`<button onclick="app.answer('${o.w.replace(/'/g,"\\'")}')" class="bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 rounded-xl py-4 font-bold text-lg btn-press hover:border-green-400 dark:text-gray-200">${o.w}</button>`).join('')}
          </div>
        </div>`;
    }
    if (q.type === 'match') {
      return `
        <div class="slide-up">
          <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-4">将单词和意思配对</h2>
          ${q.matchWrong ? '<div class="bg-red-50 dark:bg-red-900/20 text-red-500 p-3 rounded-xl mb-4 shake text-center text-sm">❌ 配对错误，再试一次！</div>' : ''}
          <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="space-y-2">
              ${q.matchLeft.map(p=>`
                <button onclick="app.matchClick('left','${p.w.replace(/'/g,"\\'")}')" class="w-full py-3 rounded-xl font-bold btn-press ${q.matched.includes(p.w)?'bg-green-100 dark:bg-green-900/30 text-green-400 opacity-50':q.selLeft===p.w?'bg-green-500 text-white':'bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 dark:text-gray-200'}">${p.w}</button>
              `).join('')}
            </div>
            <div class="space-y-2">
              ${q.matchRight.map(p=>`
                <button onclick="app.matchClick('right','${p.m.replace(/'/g,"\\'")}')" class="w-full py-3 rounded-xl text-sm btn-press ${q.matched.some(w=>q.matchPairs.find(x=>x.w===w)?.m===p.m)?'bg-green-100 dark:bg-green-900/30 text-green-400 opacity-50':q.selRight===p.m?'bg-green-500 text-white':'bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 dark:text-gray-200'}">${p.m}</button>
              `).join('')}
            </div>
          </div>
          <p class="text-center text-sm text-gray-400 dark:text-gray-500">${q.matched.length}/4 已配对</p>
        </div>`;
    }
    if (q.type === 'spell') {
      return `
        <div class="slide-up text-center">
          <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-2">拼写单词</h2>
          <button onclick="speak('${q.word.w.replace(/'/g,"\\'")}')" class="bg-blue-500 text-white w-20 h-20 rounded-full text-3xl btn-press shadow-lg mb-4">🔊</button>
          <p class="text-gray-500 dark:text-gray-400 mb-4">意思：<span class="font-bold text-blue-600 dark:text-blue-400">${q.word.m}</span></p>
          <input id="spellInput" type="text" placeholder="输入单词..." class="w-full px-4 py-3 text-center text-xl border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded-xl focus:border-green-400 mb-4" onkeydown="if(event.key==='Enter')app.checkSpell()" autofocus>
          <button onclick="app.checkSpell()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold btn-press w-full">✓ 提交</button>
        </div>`;
    }
    if (q.type === 'order') {
      return `
        <div class="slide-up text-center">
          <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-2">排列字母</h2>
          <button onclick="speak('${q.word.w.replace(/'/g,"\\'")}')" class="bg-blue-500 text-white w-16 h-16 rounded-full text-2xl btn-press shadow-lg mb-4">🔊</button>
          <p class="text-gray-500 dark:text-gray-400 mb-4">意思：<span class="font-bold text-blue-600 dark:text-blue-400">${q.word.m}</span></p>
          <div class="bg-gray-100 dark:bg-gray-700 rounded-xl p-4 mb-4 min-h-[60px]">
            <div class="flex flex-wrap justify-center gap-2">
              ${q.selectedLetters.map((l,i)=>`
                <button onclick="app.unselectLetter(${i})" class="w-10 h-10 bg-green-500 text-white rounded-lg font-bold text-lg btn-press shadow">${l}</button>
              `).join('')}
            </div>
          </div>
          <div class="flex flex-wrap justify-center gap-2 mb-4">
            ${q.remainingLetters.map((l,i)=>`
              <button onclick="app.selectLetter('${l}', ${i})" class="w-10 h-10 bg-white dark:bg-gray-600 border-2 border-gray-300 dark:border-gray-500 rounded-lg font-bold text-lg btn-press shadow">${l}</button>
            `).join('')}
          </div>
          ${q.selectedLetters.length === q.word.w.length ? `
            <button onclick="app.submitOrder()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold btn-press w-full">✓ 提交答案</button>
          ` : ''}
          ${q.selectedLetters.length > 0 ? `
            <button onclick="app.clearOrder()" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-4 py-2 rounded-lg text-sm btn-press mt-2">🔄 清除</button>
          ` : ''}
        </div>`;
    }
    return '';
  }

  gameResultHTML(q) {
    const g = this.game;
    const msg = g.result ? cheers[Math.floor(Math.random()*cheers.length)] : oops[Math.floor(Math.random()*oops.length)];
    return `
      <div class="slide-up">
        <div class="${g.result?'bg-green-50 dark:bg-green-900/20':'bg-red-50 dark:bg-red-900/20'} rounded-2xl p-6 text-center mb-4">
          <div class="text-5xl mb-2 ${g.result?'':'shake'}">${g.result?'✅':'❌'} ${g.result && g.combo>=3?'<span class="sparkle">✨</span>':''}</div>
          <h2 class="text-xl font-bold ${g.result?'text-green-600 dark:text-green-400':'text-red-500 dark:text-red-400'}">${msg}</h2>
          ${!g.result?`<p class="text-gray-600 dark:text-gray-400 mt-2">正确答案：<span class="font-bold text-green-600 dark:text-green-400">${q.word.w}</span></p>
          <p class="text-xs text-gray-500 dark:text-gray-500 mt-1">${q.word.w} - ${q.word.m}</p>`:`<p class="text-gray-600 dark:text-gray-400 mt-2">${q.word.w} - ${q.word.m}</p>`}
        </div>
        <button onclick="app.nextQuestion()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold btn-press w-full">继续 → <span class="text-xs opacity-70">(按回车)</span></button>
      </div>`;
  }

  answer(w) {
    const g = this.game;
    if (g.result !== null) return;
    const correct = w === g.curr.word.w;
    g.result = correct;
    g.correct += correct ? 1 : 0;
    if (correct) {
      g.combo++;
      g.maxCombo = Math.max(g.maxCombo, g.combo);
      g.xp += 10 + Math.min(g.combo-1, 5) * 2;
    } else {
      g.combo = 0;
      g.hearts--;
      g.wrongWords.push(g.curr.word.w);
    }
    this.saveWP(g.curr.word.w, correct);
    this.render();
  }

  matchClick(side, val) {
    const q = this.game.curr;
    if (q.matched.includes(val) && side==='left') return;
    if (q.matched.some(w=>q.matchPairs.find(x=>x.w===w)?.m===val) && side==='right') return;

    if (side==='left') { q.selLeft = val; }
    else { q.selRight = val; }

    // Clear wrong feedback when user clicks again
    q.matchWrong = false;

    if (q.selLeft && q.selRight) {
      const pair = q.matchPairs.find(p=>p.w===q.selLeft);
      if (pair && pair.m === q.selRight) {
        // Correct match
        q.matched.push(q.selLeft);
        q.selLeft = null; q.selRight = null;
        if (q.matched.length === 4) {
          this.game.result = true;
          this.game.correct++;
          this.game.combo++;
          this.game.maxCombo = Math.max(this.game.maxCombo, this.game.combo);
          this.game.xp += 15 + Math.min(this.game.combo-1, 5) * 2;
          q.matched.forEach(w=>this.saveWP(w, true));
        }
      } else {
        // Wrong match — show feedback but don't lose hearts immediately
        q.matchWrong = true;
        q.selLeft = null;
        q.selRight = null;
        // Still track wrong but less punishing
        this.game.combo = 0;
        // Only lose heart after 2 wrong attempts
        if (!q._wrongCount) q._wrongCount = 0;
        q._wrongCount++;
        if (q._wrongCount >= 3) {
          this.game.hearts--;
          q._wrongCount = 0;
        }
      }
    }
    this.render();
  }

  checkSpell() {
    const g = this.game;
    if (g.result !== null) return;
    const input = (document.getElementById('spellInput')?.value || '').toLowerCase().trim();
    const correct = input === g.curr.word.w.toLowerCase();
    g.result = correct;
    g.correct += correct ? 1 : 0;
    if (correct) {
      g.combo++;
      g.maxCombo = Math.max(g.maxCombo, g.combo);
      g.xp += 15 + Math.min(g.combo-1, 5) * 2;
    } else {
      g.combo = 0;
      g.hearts--;
      g.wrongWords.push(g.curr.word.w);
    }
    this.saveWP(g.curr.word.w, correct);
    this.render();
  }

  selectLetter(l, idx) {
    const q = this.game.curr;
    if (q.result !== null) return;
    q.selectedLetters.push(l);
    q.remainingLetters.splice(idx, 1);
    this.render();
  }

  unselectLetter(idx) {
    const q = this.game.curr;
    if (q.result !== null) return;
    const l = q.selectedLetters.splice(idx, 1)[0];
    q.remainingLetters.push(l);
    this.render();
  }

  submitOrder() {
    const g = this.game;
    const q = g.curr;
    if (g.result !== null) return;
    const correct = q.selectedLetters.join('') === q.word.w;
    g.result = correct;
    g.correct += correct ? 1 : 0;
    if (correct) {
      g.combo++;
      g.maxCombo = Math.max(g.maxCombo, g.combo);
      g.xp += 15 + Math.min(g.combo-1, 5) * 2;
    } else {
      g.combo = 0;
      g.hearts--;
      g.wrongWords.push(q.word.w);
    }
    this.saveWP(q.word.w, correct);
    this.render();
  }

  clearOrder() {
    const q = this.game.curr;
    q.remainingLetters = [...q.shuffledLetters];
    q.selectedLetters = [];
    this.render();
  }

  nextQuestion() {
    const g = this.game;
    g.qIdx++;
    if (g.hearts <= 0 || g.qIdx >= g.total) {
      g.finished = true;
    } else {
      g.curr = g.questions[g.qIdx];
      g.result = null;
      this.prepareQuestion();
    }
    this.render();
  }

  saveWP(word, correct) {
    const w = typeof word === 'string' ? word : word.w;
    const p = load('wp', {});
    if (!p[w]) p[w] = { c:0, w:0, learned:false };
    if (correct) { p[w].c++; p[w].learned = p[w].c >= 3; }
    else p[w].w++;
    save('wp', p);
  }
}

// Helper: get CSS color for phonics legend (light mode)
function getComputedClassColor(cls) {
  const map = { 'syl-closed':'#2563EB', 'syl-open':'#DC2626', 'syl-magic-e':'#16A34A', 'syl-r-control':'#EA580C', 'syl-vowel-team':'#CA8A04', 'syl-special':'#9333EA' };
  return map[cls] || '#6B7280';
}
function getComputedClassColorDark(cls) {
  const map = { 'syl-closed':'#60A5FA', 'syl-open':'#F87171', 'syl-magic-e':'#4ADE80', 'syl-r-control':'#FB923C', 'syl-vowel-team':'#FACC15', 'syl-special':'#C084FC' };
  return map[cls] || '#9CA3AF';
}

const app = new App();
</script>
</body>
</html>
